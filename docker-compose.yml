version: '3.5'

# docker-compose up -d (-d is --detach to run in the background)
# docker-compose down (deleted the containers)
services:
  milvus:
    container_name: milvus-standalone-db-1
    image: milvusdb/milvus:v2.6.15
    command: [ "milvus", "run", "standalone" ]
    environment:
      DEPLOY_MODE: "STANDALONE"
      # Embedded settings
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
      COMMON_STORAGETYPE: "local"
    volumes:
      # Map your local folder to the container's data path
      - ./milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      timeout: 20s
      retries: 3